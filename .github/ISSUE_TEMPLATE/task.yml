name: Task
description: Track a scoped implementation task or technical improvement
title: "[Task]: "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for scoped implementation work that doesn't fit bug or feature categories.
  - type: input
    id: area
    attributes:
      label: Affected area
      placeholder: "contracts / sdk / backend / frontend / ci / docs"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What needs to be done
      description: Describe the task clearly and specifically.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and motivation
      description: Why does this task need to happen?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know it's done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
