name: Lint

on:
  push:
  pull_request:

jobs:
  lint-rust:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-
      - name: Check formatting
        run: cargo fmt -- --check
        working-directory: contracts
      - name: Run Clippy
        run: >
          cargo clippy
          -p lineproof-queue-factory
          -p lineproof-queue
          -p lineproof-enrollment
          -p lineproof-escrow
          -p lineproof-identity
          -- -D warnings
        working-directory: contracts

  lint-sdk:
    name: SDK Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck

  lint-backend:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit

  lint-frontend:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Checkout root workspace
        run: cd .. && pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
