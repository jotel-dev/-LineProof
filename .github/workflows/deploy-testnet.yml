name: Deploy to Testnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm testnet deployment'
        required: true

jobs:
  deploy:
    name: Deploy Contracts to Testnet
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Build WASM artifacts
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Configure Soroban identity
        run: |
          echo "${{ secrets.STELLAR_PRIVATE_KEY }}" | soroban keys add deployer --secret-key
        env:
          STELLAR_NETWORK: testnet

      - name: Deploy lineproof-enrollment
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_enrollment.wasm \
            --source deployer \
            --network testnet
        id: deploy-enrollment

      - name: Deploy lineproof-identity
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_identity.wasm \
            --source deployer \
            --network testnet
        id: deploy-identity

      - name: Deploy lineproof-escrow
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_escrow.wasm \
            --source deployer \
            --network testnet
        id: deploy-escrow

      - name: Deploy lineproof-queue
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_queue.wasm \
            --source deployer \
            --network testnet
        id: deploy-queue

      - name: Deploy lineproof-queue-factory
        run: |
          soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_queue_factory.wasm \
            --source deployer \
            --network testnet
        id: deploy-factory

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: testnet-deployment-${{ github.run_number }}
          path: deployment-summary.json
          retention-days: 30
