name: Deploy to Testnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm testnet deployment'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy Contracts to Testnet
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM artifacts
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Configure Stellar identity
        run: |
          echo "${{ secrets.STELLAR_PRIVATE_KEY }}" | stellar keys add deployer --secret-key
        env:
          STELLAR_NETWORK: testnet

      - name: Deploy lineproof-enrollment
        id: deploy-enrollment
        run: |
          stellar contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_enrollment.wasm \
            --source deployer \
            --network testnet

      - name: Deploy lineproof-identity
        id: deploy-identity
        run: |
          stellar contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_identity.wasm \
            --source deployer \
            --network testnet

      - name: Deploy lineproof-escrow
        id: deploy-escrow
        run: |
          stellar contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_escrow.wasm \
            --source deployer \
            --network testnet

      - name: Deploy lineproof-queue
        id: deploy-queue
        run: |
          stellar contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_queue.wasm \
            --source deployer \
            --network testnet

      - name: Deploy lineproof-queue-factory
        id: deploy-factory
        run: |
          stellar contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/lineproof_queue_factory.wasm \
            --source deployer \
            --network testnet

      - name: Write deployment summary
        run: |
          echo "{\"run\": ${{ github.run_number }}, \"network\": \"testnet\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > deployment-summary.json

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: testnet-deployment-${{ github.run_number }}
          path: deployment-summary.json
          retention-days: 30
